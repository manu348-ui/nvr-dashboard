<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="300">
<title>NVR Monitor Estudio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1923;color:#e0e0e0;min-height:100vh}
  header{background:#1a2634;padding:16px 24px;border-bottom:1px solid #2a3a4a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .logo{font-size:1.1em;font-weight:700;color:#fff;letter-spacing:1px}
  .logo span{color:#3498db}
  .logo em{color:#aaa;font-style:normal;font-weight:400;font-size:.85em;margin-left:6px}
  .nvr-status{display:flex;align-items:center;gap:8px;font-size:.85em;color:#aaa}
  .dot{width:10px;height:10px;border-radius:50%;background:#e74c3c;box-shadow:0 0 8px #e74c3c}
  .stats{display:flex;gap:12px;padding:20px 24px;flex-wrap:wrap}
  .stat-card{flex:1;min-width:140px;background:#1a2634;border-radius:10px;padding:16px 20px;text-align:center;border:1px solid #2a3a4a}
  .stat-num{font-size:2.2em;font-weight:700;line-height:1}
  .stat-label{font-size:.8em;color:#aaa;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .section-title{padding:8px 24px;font-size:.75em;color:#7a8a9a;text-transform:uppercase;letter-spacing:1px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:0 24px 24px}
  .card{background:#1a2634;border-radius:10px;padding:14px;border:1px solid #2a3a4a;transition:transform .15s}
  .card:hover{transform:translateY(-2px)}
  .thumb{width:100%;height:110px;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:2.5em;position:relative;overflow:hidden}
  .thumb-label{position:absolute;bottom:4px;right:6px;font-size:.6em;font-weight:700;opacity:.7;letter-spacing:.5px}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ch{font-size:.75em;color:#7a8a9a;font-weight:600;text-transform:uppercase}
  .badge{font-size:.7em;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff;letter-spacing:.3px}
  .cam-name{font-size:.95em;font-weight:600;color:#fff;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cam-meta{display:flex;gap:10px;font-size:.75em;color:#7a8a9a;margin-top:3px;flex-wrap:wrap}
  .issues-box{margin-top:8px;padding:6px 8px;background:#2a1a1a;border-radius:6px;border-left:3px solid #e74c3c}
  .issue{font-size:.75em;color:#e74c3c;padding:1px 0}
  .alert-box{margin:0 24px 12px;padding:10px 14px;background:#2a1a1a;border-radius:8px;border-left:4px solid #e74c3c;font-size:.85em;color:#e74c3c}
  .overall{margin:16px 24px 8px;padding:12px 18px;background:#1a2634;border-radius:10px;border:1px solid #2a3a4a;display:flex;align-items:center;gap:12px}
  .overall-text{font-weight:700;font-size:.95em}
  .ts{font-size:.75em;color:#7a8a9a;margin-left:auto}
  footer{text-align:center;padding:16px;font-size:.75em;color:#3a4a5a;border-top:1px solid #1a2634}
  @media(max-width:500px){.stats{gap:8px;padding:12px}.cards{padding:0 12px 12px}.stat-num{font-size:1.8em}}
</style>
</head>
<body>
<header>
  <div class="logo">NVR <span>Monitor</span><em>Estudio</em></div>
  <div class="nvr-status">
    <div class="dot"></div>
    <span>DHI-NVR4232-4KS2 &nbsp;|&nbsp; FW —</span>
  </div>
</header>

<div class="overall">
  <div class="dot"></div>
  <div class="overall-text" style="color:#e74c3c">SISTEMA CON PROBLEMAS</div>
  <div class="ts">Actualizado: 2026-06-05 11:51:50</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num" style="color:#27ae60">0</div>
    <div class="stat-label">En linea</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" style="color:#e67e22">0</div>
    <div class="stat-label">Advertencias</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" style="color:#e74c3c">0</div>
    <div class="stat-label">Errores</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" style="color:#95a5a6">0</div>
    <div class="stat-label">Libres</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" style="color:#3498db">0</div>
    <div class="stat-label">Total activos</div>
  </div>
</div>



<div class="section-title">Camaras</div>
<div class="cards"></div>

<footer>Refresca cada 5 min &nbsp;·&nbsp; manu348.tplinkdns.com &nbsp;·&nbsp; github.com/manu348-ui/nvr-monitor</footer>
</body>
</html>
